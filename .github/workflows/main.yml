name: Gerar Dataset

on:
  workflow_dispatch:
    inputs:
      video:
        description: "Nome do vídeo (ex: agachamento.mp4)"
        required: true

      classe:
        description: "Classe (correto / errado)"
        required: true

      exercise:
        description: "Exercício"
        required: true

      erro:
        description: "Tipo de erro (opcional)"
        required: false
        default: ""

jobs:
  build-dataset:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libegl1 \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libgles2 \
            libglib2.0-0 \
            libsm6 \
            libxext6 \
            libxrender-dev

      - name: Instalar dependências Python
        run: |
          pip install --upgrade pip
          pip install pandas numpy opencv-python mediapipe scikit-learn boto3

      - name: Configurar AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Rodar pipeline (com integração S3)
        env:
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          python pipeline.py \
            --video "${{ github.event.inputs.video }}" \
            --classe "${{ github.event.inputs.classe }}" \
            --exercise "${{ github.event.inputs.exercise }}" \
            --erro "${{ github.event.inputs.erro }}"

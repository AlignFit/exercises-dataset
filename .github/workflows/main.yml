name: Gerar Dataset

on:
  workflow_dispatch:
    inputs:
      video:
        description: "Nome do vídeo (ex: agachamento.mp4)"
        required: true

      classe:
        description: "Classe (correto / errado)"
        required: true

      exercise:
        description: "Exercício"
        required: true

      erro:
        description: "Tipo de erro (opcional)"
        required: false
        default: ""

jobs:
  build-dataset:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libglib2.0-0 \
            libsm6 \
            libxext6 \
            libxrender-dev \
            libgles2

      - name: Instalar dependências Python
        run: |
          pip install --upgrade pip
          pip install pandas numpy opencv-python mediapipe scikit-learn

      - name: Rodar pipeline
        run: |
          python pipeline.py \
            --video "${{ github.event.inputs.video }}" \
            --classe "${{ github.event.inputs.classe }}" \
            --exercise "${{ github.event.inputs.exercise }}" \
            --erro "${{ github.event.inputs.erro }}"

      - name: Upload dataset
        uses: actions/upload-artifact@v4
        with:
          name: dataset
          path: dataset/dataset.csv

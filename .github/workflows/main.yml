name: Gerar Dataset

on:
  workflow_dispatch:
    inputs:
      video:
        description: "Nome do vídeo (ex: agachamento.mp4)"
        required: true

      classe:
        description: "Classe (correto / errado)"
        required: true

      exercise:
        description: "Exercício"
        required: true

      erro:
        description: "Tipo de erro (opcional)"
        required: false
        default: ""

jobs:
  build-dataset:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # 🔥 ESSENCIAL para conseguir dar push

    steps:
      - name: Checkout código
        uses: actions/checkout@v3
        with:
          fetch-depth: 0   # importante para commit/push

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libegl1 \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libgles2 \
            libglib2.0-0 \
            libsm6 \
            libxext6 \
            libxrender-dev

      - name: Instalar dependências Python
        run: |
          pip install --upgrade pip
          pip install pandas numpy opencv-python mediapipe scikit-learn

      - name: Rodar pipeline
        run: |
          python pipeline.py \
            --video "${{ github.event.inputs.video }}" \
            --classe "${{ github.event.inputs.classe }}" \
            --exercise "${{ github.event.inputs.exercise }}" \
            --erro "${{ github.event.inputs.erro }}"

      - name: Commit e push dos dados
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add dataset/ frames/ keypoints/ labels/ || true

          git commit -m "Atualiza dataset automaticamente [skip ci]" || echo "Nada para commitar"
          git push
